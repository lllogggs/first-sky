<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#071016" />
    <title>첫 하늘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <section id="homeScreen" class="home-screen" aria-label="첫 하늘 입력">
        <canvas id="ambientCanvas" class="ambient-canvas" aria-hidden="true"></canvas>
        <div class="home-shade" aria-hidden="true"></div>

        <div class="home-copy">
          <p class="eyebrow">FIRST SKY</p>
          <h1>첫 하늘</h1>
          <p>태어난 순간의 별과 날씨로 만드는 나의 하늘 타입.</p>
        </div>

        <form id="birthForm" class="birth-form">
          <div id="locationStatus" class="status-line" aria-live="polite">정보를 입력해 주세요.</div>

          <label class="field field-name">
            <span>이름</span>
            <input id="personName" name="personName" type="text" autocomplete="name" placeholder="선택" />
          </label>

          <div class="field-pair">
            <label class="field">
              <span>출생일</span>
              <input id="birthDate" name="birthDate" type="text" inputmode="numeric" autocomplete="bday" placeholder="1994-06-21" required />
            </label>
            <label class="field">
              <span>시간</span>
              <input id="birthTime" name="birthTime" type="time" required />
            </label>
          </div>

          <label class="field">
            <span>태어난 곳</span>
            <input id="birthPlace" name="birthPlace" type="search" required placeholder="서울, 부산, Tokyo" />
          </label>

          <details class="manual-coordinates">
            <summary>좌표 직접 입력</summary>
            <div class="field-pair">
              <label class="field">
                <span>위도</span>
                <input id="latitude" name="latitude" type="number" step="0.000001" min="-90" max="90" placeholder="37.5665" />
              </label>
              <label class="field">
                <span>경도</span>
                <input id="longitude" name="longitude" type="number" step="0.000001" min="-180" max="180" placeholder="126.9780" />
              </label>
            </div>
            <label class="field">
              <span>시간대</span>
              <input id="timezone" name="timezone" type="text" placeholder="Asia/Seoul" />
            </label>
          </details>

          <button id="submitButton" class="primary-button" type="submit">
            <span class="button-mark" aria-hidden="true"></span>
            <span class="button-label">내 첫 하늘 보기</span>
          </button>
        </form>
      </section>

      <section id="storyScreen" class="story-screen" aria-hidden="true" aria-label="첫 하늘 스토리">
        <div class="story-shell">
          <canvas id="storyCanvas" class="story-canvas" width="1080" height="1920" aria-label="첫 하늘 스토리 결과"></canvas>
        </div>

        <div class="story-controls">
          <button id="editButton" class="control-button" type="button">다시 입력</button>
          <button id="downloadButton" class="control-button download-button" type="button">영상 저장</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
